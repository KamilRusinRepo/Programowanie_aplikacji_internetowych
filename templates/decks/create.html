<main class="dashboard-main deck-create-main">
    <section class="deck-create-hero">
        <h1>{{form.heading}}</h1>
        <p>{{form.subheading}}</p>
    </section>

    <section class="deck-create-card">
        <form method="post" action="{{form.action}}" class="deck-create-form" data-deck-form>
            <div class="form-field">
                <label for="deck-name">Deck Name</label>
                <input id="deck-name" name="name" type="text" placeholder="e.g. European History, Advanced Japanese..." value="{{old.name}}">
                <small class="field-error">{{errors.name}}</small>
            </div>

            <div class="form-field">
                <label for="deck-description">Description</label>
                <textarea id="deck-description" name="description" rows="3" placeholder="What will you learn with this deck?">{{old.description}}</textarea>
            </div>

            <div class="form-field">
                <label>Deck Type</label>
                <div class="deck-type-toggle" role="group" aria-label="Deck type">
                    <label class="toggle-option">
                        <input type="radio" name="deck_type" value="general" {{old.generalChecked}}>
                        <span>General</span>
                    </label>
                    <label class="toggle-option">
                        <input type="radio" name="deck_type" value="language" {{old.languageChecked}}>
                        <span>Language</span>
                    </label>
                </div>
                <small class="field-error">{{errors.deck_type}}</small>
            </div>

            <div class="form-row" data-language-row>
                <div class="form-field">
                    <label for="source-language">Source Language</label>
                    <select id="source-language" name="source_language">
                        <option value="">Select language</option>
                        <option value="English" {{old.sourceEnglishSelected}}>English</option>
                        <option value="Polish" {{old.sourcePolishSelected}}>Polish</option>
                        <option value="German" {{old.sourceGermanSelected}}>German</option>
                        <option value="Spanish" {{old.sourceSpanishSelected}}>Spanish</option>
                        <option value="French" {{old.sourceFrenchSelected}}>French</option>
                        <option value="Japanese" {{old.sourceJapaneseSelected}}>Japanese</option>
                    </select>
                    <small class="field-error">{{errors.source_language}}</small>
                </div>

                <div class="form-field" data-target-language>
                    <label for="target-language">Target Language</label>
                    <select id="target-language" name="target_language">
                        <option value="">Select language</option>
                        <option value="English" {{old.targetEnglishSelected}}>English</option>
                        <option value="Polish" {{old.targetPolishSelected}}>Polish</option>
                        <option value="German" {{old.targetGermanSelected}}>German</option>
                        <option value="Spanish" {{old.targetSpanishSelected}}>Spanish</option>
                        <option value="French" {{old.targetFrenchSelected}}>French</option>
                        <option value="Japanese" {{old.targetJapaneseSelected}}>Japanese</option>
                    </select>
                    <small class="field-error">{{errors.target_language}}</small>
                </div>
            </div>

            <div class="form-field">
                <label for="deck-category">Category</label>
                <select id="deck-category" name="category">
                    <option value="">Select category</option>
                    <option value="Academic" {{old.categoryAcademicSelected}}>Academic</option>
                    <option value="Language" {{old.categoryLanguageSelected}}>Language</option>
                    <option value="History" {{old.categoryHistorySelected}}>History</option>
                    <option value="Science" {{old.categoryScienceSelected}}>Science</option>
                    <option value="Personal" {{old.categoryPersonalSelected}}>Personal</option>
                    <option value="Tech" {{old.categoryTechSelected}}>Tech</option>
                </select>
            </div>

            <div class="form-field">
                <label for="deck-background">Background Photo URL</label>
                <input id="deck-background" name="background_url" type="url" placeholder="https://example.com/image.jpg" value="{{old.background_url}}">
                <small class="field-help">Paste an http or https image URL to replace the default deck background.</small>
                <small class="field-error">{{errors.background_url}}</small>
            </div>

            <div class="deck-public">
                <div>
                    <h4>Public Deck</h4>
                    <p>Allow others to find and study this deck</p>
                </div>
                <label class="settings-toggle deck-toggle">
                    <input type="checkbox" name="is_public" {{old.isPublicChecked}}>
                    <span></span>
                </label>
            </div>

            <div class="deck-create-actions">
                <button type="submit" class="deck-create-btn">{{form.submitLabel}}</button>
                <a href="{{form.cancelUrl}}" class="deck-cancel-btn">Cancel</a>
            </div>
        </form>
    </section>
</main>
