<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css?v=3">
    <link rel="stylesheet" href="/styles/branding.css">
    <script defer src="/scripts/app.js?v=4"></script>
    <meta name="robots" content="noindex,nofollow">
</head>
<body>
    <div class="app-shell">
        <header class="site-brand">
            <div class="brand-bubble"><img src="/icons/sidebar/logo.svg" alt="FlashMind" class="brand-logo"></div>
            <div class="brand-text">
                <div class="brand-title">FlashMind</div>
                <div class="brand-sub">Master your learning</div>
            </div>
        </header>

        <div class="page-content">
            {{content}}
        </div>

        <footer class="site-footer">
            <div class="site-footer-inner">
                <a href="#">Privacy Policy</a>
                <span>&middot;</span>
                <a href="#">Terms of Service</a>
                <span>&middot;</span>
                <a href="#">Help Center</a>
            </div>
        </footer>
    </div>
</body>
</html>
