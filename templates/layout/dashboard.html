<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <script src="/scripts/theme-init.js?v=2"></script>
    <script defer src="/scripts/language-init.js?v=8"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css?v=4">
    <link rel="stylesheet" href="/styles/branding.css">
    <link rel="stylesheet" href="/styles/dashboard.css?v=mobile-360c">
    {{raw.extraCss}}
    <meta name="robots" content="noindex,nofollow">
</head>
<body class="dashboard-body {{bodyClass}}">
    <div class="dashboard-shell">
        <aside class="dashboard-sidebar">
            <button type="button" class="dashboard-sidebar-brand" data-sidebar-toggle aria-label="Toggle sidebar" title="Toggle sidebar">
                <div class="dashboard-sidebar-logo">
                    <img src="/icons/sidebar/logo.svg" alt="FlashMind">
                </div>
                <div class="dashboard-sidebar-brand-copy">
                    <div class="dashboard-sidebar-title">FlashMind</div>
                    <div class="dashboard-sidebar-subtitle">Master your learning</div>
                </div>
            </button>

            <nav class="dashboard-nav" aria-label="Primary">
                <a href="/dashboard" class="dashboard-nav-item {{nav.dashboard}}" title="Home">
                    <img src="/icons/sidebar/home.svg" alt="Home" class="dashboard-nav-icon-img">
                    <span>Home</span>
                </a>
                <a href="/decks" class="dashboard-nav-item {{nav.decks}}" title="My Decks">
                    <img src="/icons/sidebar/create_deck.svg" alt="My Decks" class="dashboard-nav-icon-img">
                    <span>My Decks</span>
                </a>
                <a href="/explore" class="dashboard-nav-item {{nav.explore}}" title="Explore Decks">
                    <img src="/icons/sidebar/explore.svg" alt="Explore Decks" class="dashboard-nav-icon-img">
                    <span>Explore Decks</span>
                </a>
                <a href="/statistics" class="dashboard-nav-item {{nav.stats}}" title="Statistics">
                    <img src="/icons/sidebar/statistics.svg" alt="Statistics" class="dashboard-nav-icon-img">
                    <span>Statistics</span>
                </a>
                <a href="/admin" class="dashboard-nav-item {{adminNav.class}}" title="Admin Panel">
                    <img src="/icons/admin_panel/admin_icon.svg" alt="Admin Panel" class="dashboard-nav-icon-img">
                    <span>Admin Panel</span>
                </a>
                <a href="/settings" class="dashboard-nav-item {{nav.settings}}" title="Settings">
                    <img src="/icons/sidebar/settings.svg" alt="Settings" class="dashboard-nav-icon-img">
                    <span>Settings</span>
                </a>
            </nav>

            <div class="dashboard-sidebar-user-wrap">
                <div class="user-logout-popover" aria-hidden="true">
                    <button type="button" class="user-logout-btn">Logout</button>
                </div>

                <div class="dashboard-sidebar-user" data-user-toggle>
                    <div class="dashboard-user-avatar">{{userInitials}}</div>
                    <div>
                        <div class="dashboard-user-name">{{displayName}}</div>
                        <div class="dashboard-user-role">Pro Learner</div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="dashboard-content-shell">
            {{content}}
        </div>
    </div>
    <nav class="mobile-bottom-nav" aria-label="Mobile primary">
        <a href="/dashboard" class="mobile-bottom-nav-item {{nav.dashboard}}">
            <img src="/icons/sidebar/home.svg" alt="" aria-hidden="true">
            <span>Home</span>
        </a>
        <a href="/decks" class="mobile-bottom-nav-item {{nav.decks}}">
            <img src="/icons/sidebar/create_deck.svg" alt="" aria-hidden="true">
            <span>My Decks</span>
        </a>
        <a href="/explore" class="mobile-bottom-nav-item {{nav.explore}}">
            <img src="/icons/sidebar/explore.svg" alt="" aria-hidden="true">
            <span>Explore</span>
        </a>
        <a href="/statistics" class="mobile-bottom-nav-item {{nav.stats}}">
            <img src="/icons/sidebar/statistics.svg" alt="" aria-hidden="true">
            <span>Stats</span>
        </a>
        <a href="/admin" class="mobile-bottom-nav-item {{adminNav.class}}">
            <img src="/icons/admin_panel/admin_icon.svg" alt="" aria-hidden="true">
            <span>Admin</span>
        </a>
        <a href="/settings" class="mobile-bottom-nav-item {{nav.settings}}">
            <img src="/icons/sidebar/settings.svg" alt="" aria-hidden="true">
            <span>Settings</span>
        </a>
    </nav>
    <div class="app-confirm-modal" data-confirm-modal hidden>
        <div class="app-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="app-confirm-title">
            <h2 id="app-confirm-title" data-confirm-title>Are you sure?</h2>
            <p data-confirm-message>This action cannot be undone.</p>
            <div class="app-confirm-actions">
                <button type="button" class="app-confirm-cancel" data-confirm-cancel>Cancel</button>
                <button type="button" class="app-confirm-submit" data-confirm-submit>Delete</button>
            </div>
        </div>
    </div>
    <script defer src="/scripts/dashboard-layout.js?v=4"></script>
    <script defer src="/scripts/confirm-modal.js?v=1"></script>
    {{raw.extraJs}}
</body>
</html>
